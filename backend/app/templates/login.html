<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

    <!-- Marcellus 폰트 불러오기 -->
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">
    <!-- 나눔글씨 외할머니글씨 폰트 불러오기 -->
    <link href="https://hangeul.pstatic.net/hangeul_static/css/NanumOeHarMeoNiGeurSsi.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <h2>로그인</h2>
        <!-- login.html -->
        <form action="{{ url_for('auth.login') }}" method="post">
            {{ form.hidden_tag() }}  <!-- CSRF 토큰 -->
            <div>
                <label for="username">아이디</label>
                {{ form.username(class="form-control") }}  <!-- form.username 필드 -->
            </div>
            <div>
                <label for="password">비밀번호</label>
                {{ form.password(class="form-control") }}  <!-- form.password 필드 -->
            </div>
            <button type="submit" class="btn btn-primary">로그인</button>
        </form>

        <p>계정이 없으신가요? <a href="{{ url_for('auth.signup') }}" class="signup-link">회원가입</a></p>
    </div>
</body>
</html>
